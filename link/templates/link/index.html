{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinyme</title>

    <link rel="stylesheet" href="{% static 'link/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'link/css/card.css'%}">
    <link rel="stylesheet" href="{% static 'link/css/landing.css'%}">
    <link rel="stylesheet" href="{% static 'link/css/navbar.css'%}">
    <link rel="stylesheet" href="{% static 'link/css/footer.css'%}">
    {% block extra_css %}{% endblock %}
    <script src="{%static 'link/js/app.js'%}">  </script>
</head>
<body>
    <nav class="navbar">
        {% if user.is_authenticated %}
            <a class = "navbar-brand" href="{% url 'home' %}">
                <img src="{% static 'assets/images/logo_tiny.png'%}" alt="logo">
            </a>
        {% else %}
            <a class = "navbar-brand" href="{% url 'landing' %}">
                <img src="{% static 'assets/images/logo_tiny.png'%}" alt="logo">
            </a>
        {% endif %}
        <div class="Nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'account'%}"> Account </a>
                <a href="{% url 'home' %}"> Home </a>
                <a href="{% url 'dashboard' %}"> Dashboard </a>
            {% else %}
                <a href="{% url 'login' %}"> Login </a>
                <a href="{% url 'signup' %}"> Signup </a>
            {% endif %}
        </div>
        
    </nav>

    <div class = "content">
        {% block content %}

        {% endblock %}
    </div>
</body>
</html>
